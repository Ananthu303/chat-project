services:
  redis:
    image: redis:7
    container_name: chat_application_redis
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: chat_application_web
    command: >
      sh -c "
      python manage.py migrate &&
      daphne -b 0.0.0.0 -p 8000 chat_application.asgi:application
      "
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - redis